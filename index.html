<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Mrs. Lawrence-Khoza ❤️</title>

<!-- Google Cursive Font -->
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Dancing Script', cursive;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* Blurred beach background */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url("nahoon.jpg") no-repeat center center fixed;
    background-size: cover;
    filter: blur(8px);
    z-index: -3;
}

/* Overlay for contrast */
body::after {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.2);
    z-index: -2;
}

/* Waves animation */
.waves {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 200%;
    height: 20%;
    background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.15) 10%, transparent 11%),
                radial-gradient(circle at 25% 60%, rgba(255,255,255,0.15) 10%, transparent 11%);
    background-size: 50px 50px;
    animation: waveMove 8s linear infinite;
    z-index: -1;
}

@keyframes waveMove {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
}

.container {
    text-align: center;
    transition: opacity 1s;
}

h2 {
    color: #800000;
}

.envelope {
    width: 240px;
    height: 150px;
    background: #f5f5dc;
    position: relative;
    cursor: pointer;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    transition: transform 0.3s;
    border: 2px solid gold;
}

.envelope:hover {
    transform: scale(1.05);
}

.flap {
    width: 0;
    height: 0;
    border-left: 120px solid transparent;
    border-right: 120px solid transparent;
    border-bottom: 75px solid #e8dccb;
    position: absolute;
    top: -75px;
    left: 0;
    transform-origin: bottom;
    transition: transform 1.2s ease;
}

.envelope-text {
    position: absolute;
    width: 100%;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #800000;
    font-size: 20px;
    font-weight: 500;
}

.fullscreen-letter {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px;
    box-sizing: border-box;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.5s ease;
}

.fullscreen-letter.show {
    opacity: 1;
    pointer-events: all;
}

.letter-content {
    max-width: 600px;
    font-size: 20px;
    line-height: 1.8;
    color: #800000;
    text-align: center;
    border: 3px solid gold;
    padding: 30px;
    border-radius: 12px;
    background: rgba(255,192,203,0.5);
    backdrop-filter: blur(4px);
}

.cursor {
    display: inline-block;
    width: 2px;
    background: #800000;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}
</style>
</head>
<body>

<!-- Waves -->
<div class="waves"></div>

<div class="container" id="start">
    <h2>Click the envelope 💌</h2>
    <div class="envelope" onclick="openLetter()">
        <div class="flap" id="flap"></div>
        <div class="envelope-text">For My Lolla 💌</div>
    </div>
</div>

<!-- Music -->
<audio id="bgMusic" src="Risk It All [BF2_ipR1OI0].mp3"></audio>

<div class="fullscreen-letter" id="letterScreen">
    <div class="letter-content">
        <span id="text"></span><span class="cursor"></span>
    </div>
</div>

<script>
const message = `My dearest Mrs. Lawrence-Khoza,<br><br>
You are the softest part of my world,<br>
indawo yam yothando,<br>
and the love I never knew I needed so deeply.<br><br>
Every moment with you<br>
feels like something out of a dream<br>
I never want to wake up from.<br><br>
Ukthanda,<br>
nokukhathalela<br>
biyiyo yodwa into ekheyaza lula empilwen yam.<br>
uyitshom yam, iSthandwa Sam, nomntwam<br><br>
Forever Yours Langalam,<br>
Enkosi-Kwandolwethu ❤️`;

let i = 0;

function typeWriter() {
    if (i < message.length) {
        if (message.substring(i, i+4) === '<br>') {
            document.getElementById("text").innerHTML += '<br>';
            i += 4;
        } else {
            document.getElementById("text").innerHTML += message.charAt(i);
            i++;
        }
        setTimeout(typeWriter, 70); // slower typing
    }
}

function openLetter() {
    document.getElementById("flap").style.transform = "rotateX(180deg)";

    const music = document.getElementById("bgMusic");
    music.loop = true;
    music.currentTime = 30; // start in middle of song
    music.volume = 0;

    music.play().then(() => {
        let vol = 0;
        const fade = setInterval(() => {
            if (vol < 0.4) { // softer
                vol += 0.01;
                music.volume = vol;
            } else {
                clearInterval(fade);
            }
        }, 200);
    }).catch(err => console.log("Audio blocked:", err));

    setTimeout(() => {
        document.getElementById("start").style.opacity = "0";
    }, 800);

    setTimeout(() => {
        document.getElementById("letterScreen").classList.add("show");
        typeWriter();
    }, 1500);
}
</script>

</body>
</html>
