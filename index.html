<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meet - Us</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
}

/* Background */
.background {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('nahoon.jpg') center/cover no-repeat;
  filter: blur(8px);
  z-index: -1;
}

/* Landing Page */
.landing {
  display: flex;
  justify-content: space-around;
  align-items: center;
  height: 100vh;
}

.person {
  position: relative;
  width: 220px;
  height: 220px;
  cursor: pointer;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}

.photo-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  filter: blur(6px);
  transition: transform 0.5s ease, filter 0.5s ease;
  border-radius: 20px;
  z-index: 0;
}

.person .name {
  position: relative;
  z-index: 1;
  font-size: 28px;
  color: maroon;
  font-family: 'Great Vibes', cursive;
  text-align: center;
}

.person:hover .photo-bg {
  transform: scale(1.05) translateY(-5px);
  filter: blur(3px);
}

/* Profile View */
.profile {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  gap: 40px;
}

.id-card {
  background: #fff5f7;
  padding: 20px;
  border-radius: 20px;
  width: 300px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.id-top {
  display: flex;
  gap: 15px;
}

.id-top img {
  width: 100px;
  height: 100px;
  border-radius: 15px;
  object-fit: cover;
}

.id-text {
  font-family: 'Great Vibes', cursive;
  color: maroon;
  font-size: 18px;
}

.letter {
  background: #fff;
  padding: 30px;
  border-radius: 20px;
  width: 400px;
  font-family: 'Great Vibes', cursive;
  color: maroon;
  font-size: 22px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.back {
  position: absolute;
  top: 20px;
  left: 20px;
  cursor: pointer;
  font-size: 18px;
  color: maroon;
}
</style>
</head>
<body>

<div class="background"></div>

<!-- Landing -->
<div class="landing" id="landing">
  <div class="person" onclick="openProfile('person1')">
    <div class="photo-bg" style="background-image: url('person1.jpg');"></div>
    <div class="name">Enkosi-Kwandolwethu</div>
  </div>

  <div class="person" onclick="openProfile('person2')">
    <div class="photo-bg" style="background-image: url('person2.jpg');"></div>
    <div class="name">Luyanda</div>
  </div>
</div>

<!-- Profile -->
<div class="profile" id="profile">
  <div class="back" onclick="goBack()">← Back</div>

  <div class="id-card" id="idCard"></div>
  <div class="letter" id="letter"></div>
</div>

<audio autoplay loop>
  <source src="your-music.mp3" type="audio/mpeg">
</audio>

<script>
function openProfile(person) {
  document.getElementById('landing').style.display = 'none';
  document.getElementById('profile').style.display = 'flex';

  if(person === 'person1') {
    document.getElementById('idCard').innerHTML = `
      <div class="id-top">
        <img src="person1.jpg">
        <div class="id-text">
          Name: Enkosi-Kwandolwethu 💌<br>
          Loves: Luyanda<br>
          Status: Taken ❤️<br>
          Since: Always
        </div>
      </div>
    `;

    document.getElementById('letter').innerHTML = `
      I still remember the first moment I realized you weren’t just someone I liked...<br><br>
      Every quiet moment became meaningful because it was with you.<br><br>
      I would choose you again, today, tomorrow, forever.
    `;
  }

  if(person === 'person2') {
    document.getElementById('idCard').innerHTML = `
      <div class="id-top">
        <img src="person2.jpg">
        <div class="id-text">
          Name: Luyanda 💌<br>
          Loves: Enkosi-Kwandolwethu<br>
          Status: Yours ❤️<br>
          Since: The beginning
        </div>
      </div>
    `;

    document.getElementById('letter').innerHTML = `
      Somehow, you became my favorite part of every day...<br><br>
      You make every moment softer and brighter.<br><br>
      I didn’t just fall for you—I found my home in you.
    `;
  }
}
